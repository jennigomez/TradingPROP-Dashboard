<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingPROP Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f0f5fb;
    --bg3: #e3edf8;
    --text: #0d1a2e;
    --text2: #5a6a82;
    --text3: #8fa0b8;
    --border: rgba(24,95,165,0.12);
    --border2: rgba(24,95,165,0.24);
    --radius: 8px;
    --radius-lg: 12px;
    --brand: #185FA5;
    --brand-dark: #0C447C;
    --brand-light: #E6F1FB;
    --green: #1D9E75;
    --red: #D85A30;
    --amber: #BA7517;
    --blue: #185FA5;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1520;
      --bg2: #111d2e;
      --bg3: #080e18;
      --text: #dce8f5;
      --text2: #7a97b8;
      --text3: #4a6480;
      --border: rgba(55,138,221,0.14);
      --border2: rgba(55,138,221,0.28);
      --brand-light: #0c1e33;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  .app { max-width: 1280px; margin: 0 auto; padding: 0 16px 60px; }

  /* TOPBAR */
  .topbar { background: var(--bg); border-bottom: 2px solid var(--brand); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(24,95,165,0.08); }
  .topbar-inner { max-width: 1280px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; gap: 16px; }
  .topbar-logo { display: flex; align-items: center; gap: 10px; padding: 10px 0; text-decoration: none; flex-shrink: 0; }
  .logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
  .topbar-brand { font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; letter-spacing: -0.3px; }
  .topbar-brand .prop { color: #ffffff; background: var(--brand); padding: 1px 5px; border-radius: 4px; font-size: 13px; letter-spacing: 0.5px; }
  .topbar-brand .dash { font-weight: 400; color: var(--text2); font-size: 13px; margin-left: 5px; }
  .topbar-tabs { display: flex; gap: 0; overflow-x: auto; flex: 1; }
  .topbar-tabs::-webkit-scrollbar { display: none; }
  .ttab { font-size: 13px; font-weight: 400; color: var(--text2); padding: 14px 13px; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; margin-bottom: -2px; }
  .ttab.active { color: var(--brand); font-weight: 600; border-bottom-color: var(--brand); }
  .ttab:hover:not(.active) { color: var(--text); }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .save-badge { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 4px 10px; border-radius: 99px; border: 0.5px solid var(--border); white-space: nowrap; }

  /* LAYOUT */
  .page { padding-top: 24px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; margin-bottom: 16px; }
  .kpi { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; border-left: 3px solid var(--brand); }
  .kpi-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
  .kpi-val { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .pos { color: #1D9E75 !important; } .neg { color: #D85A30 !important; } .warn { color: #BA7517 !important; } .inf { color: #185FA5 !important; }

  .row { display: grid; gap: 12px; margin-bottom: 14px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .chart-wrap { position: relative; }
  .h180 { height: 180px; } .h200 { height: 200px; } .h220 { height: 220px; }

  /* SPLASH SCREEN */
  .splash { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; }
  .splash-logo { margin-bottom: 20px; }
  .splash-title { font-size: 32px; font-weight: 800; color: var(--text); letter-spacing: -1px; margin-bottom: 6px; }
  .splash-title .prop { color: var(--brand); }
  .splash-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 36px; }
  .splash-divider { width: 48px; height: 3px; background: var(--brand); border-radius: 99px; margin-bottom: 36px; }
  .splash-enter { background: var(--brand); color: #fff; border: none; border-radius: var(--radius); padding: 13px 36px; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.2px; transition: background .2s; }
  .splash-enter:hover { background: #0C447C; }
  .splash-footer { margin-top: 20px; font-size: 11px; color: var(--text3); }
  .splash.hidden { display: none; }
  .prop-splash { color: #ffffff; background: var(--brand); padding: 2px 10px; border-radius: 6px; margin-left: 4px; }

  /* TABLES */
  .tbl-wrap { overflow-x: auto; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { font-size: 10px; color: var(--text2); text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  .tbl td { padding: 9px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover td { background: var(--bg2); }

  /* BADGES */
  .badge { display: inline-block; font-size: 11px; padding: 0; font-weight: 600; white-space: nowrap; }
  .b-active { color: #1D9E75; }
  .b-eval   { color: #BA7517; }
  .b-funded { color: #185FA5; }
  .b-paused { color: #888; }
  .b-burned { color: #D85A30; font-weight: 700; }
  .acct-card-burned { background: rgba(216,90,48,0.06); border: 1.5px solid #D85A30 !important; }
  .s-badge { display: inline-block; font-size: 11px; padding: 0; font-weight: 500; white-space: nowrap; color: var(--text2); }
  .strat-badge { display: inline-block; font-size: 11px; padding: 0; font-weight: 400; color: var(--text2); white-space: nowrap; }

  /* DD BAR */
  .dd-bar-bg { background: var(--bg2); border-radius: 99px; height: 4px; margin-top: 3px; }
  .dd-bar { height: 4px; border-radius: 99px; }

  /* FIRMS ACCORDION */
  .firm-group { margin-bottom: 10px; }
  .firm-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; flex-wrap: wrap; gap: 8px; }
  .firm-header:hover { border-color: var(--brand); background: var(--brand-light); }
  .firm-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .firm-header-name { font-weight: 500; font-size: 14px; color: var(--text); flex: 1; min-width: 100px; }
  .firm-header-meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; }
  .firm-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .fstat { text-align: right; }
  .fstat-val { font-size: 13px; font-weight: 500; color: var(--text); }
  .fstat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; }
  .chevron { font-size: 11px; color: var(--text2); transition: transform .2s; margin-left: 4px; }
  .chevron.open { transform: rotate(180deg); }
  .firm-accounts { display: none; padding: 8px 0 0 0; }
  .firm-accounts.open { display: block; }

  .acct-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; }
  .acct-top { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
  .acct-name { font-weight: 500; font-size: 13px; color: var(--text); }
  .acct-id { font-size: 10px; color: var(--text2); }
  .acct-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .acct-metrics { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; margin-top: 12px; }
  .acct-metric { text-align: center; }
  .acct-metric-val { font-size: 13px; font-weight: 500; color: var(--text); }
  .acct-metric-label { font-size: 10px; color: var(--text2); margin-top: 1px; text-transform: uppercase; }
  .acct-actions { margin-left: auto; display: flex; gap: 4px; }

  /* BUTTONS */
  .btn-add { font-size: 12px; color: var(--brand); background: var(--brand-light); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 8px 16px; cursor: pointer; margin-bottom: 12px; display: inline-block; font-weight: 500; }
  .btn-add:hover { background: #d0e4f7; }
  .btn-sm { font-size: 11px; color: var(--text2); background: none; border: 0.5px solid var(--border2); border-radius: 4px; padding: 3px 9px; cursor: pointer; }
  .btn-sm:hover { background: var(--bg2); }
  .btn-edit { font-size: 10px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .btn-edit:hover { background: var(--bg2); }
  .btn-del { font-size: 11px; color: #D85A30; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .btn-primary { background: var(--brand); color: #fff; border: none; border-radius: var(--radius); padding: 9px 20px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .btn-primary:hover { background: #0C447C; }
  .btn-sec { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 9px 20px; font-size: 13px; cursor: pointer; color: var(--text2); }
  .btn-sec:hover { background: var(--bg2); }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 500; align-items: center; justify-content: center; padding: 16px; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 500; color: var(--text); margin-bottom: 1.25rem; }
  .f-row { margin-bottom: 10px; }
  .f-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: .03em; }
  .f-row input, .f-row select {
    width: 100%; font-size: 13px; padding: 8px 10px;
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); color: var(--text); outline: none;
  }
  .f-row input:focus, .f-row select:focus { border-color: var(--blue); }
  .f-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .f-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .f-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* SUMMARY ROWS */
  .sum-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
  .sum-row:last-child { border-bottom: none; font-weight: 500; font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 20px; border-radius: 99px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* SECTION LABEL */
  .sect-label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; margin-top: 4px; }

  @media (max-width: 700px) {
    .kpi-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .row-2, .row-3 { grid-template-columns: 1fr; }
    .acct-metrics { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .firm-stats { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="topbar-logo" href="#">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="7" fill="#185FA5"/>
        <!-- Candlestick 1 - bajista -->
        <rect x="7" y="13" width="4" height="7" rx="1" fill="#fff" opacity="0.5"/>
        <line x1="9" y1="10" x2="9" y2="13" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
        <line x1="9" y1="20" x2="9" y2="23" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
        <!-- Candlestick 2 - bajista -->
        <rect x="14" y="10" width="4" height="9" rx="1" fill="#fff" opacity="0.75"/>
        <line x1="16" y1="7" x2="16" y2="10" stroke="#fff" stroke-width="1.5" opacity="0.75"/>
        <line x1="16" y1="19" x2="16" y2="22" stroke="#fff" stroke-width="1.5" opacity="0.75"/>
        <!-- Candlestick 3 - alcista -->
        <rect x="21" y="7" width="4" height="10" rx="1" fill="#fff"/>
        <line x1="23" y1="5" x2="23" y2="7" stroke="#fff" stroke-width="1.5"/>
        <line x1="23" y1="17" x2="23" y2="20" stroke="#fff" stroke-width="1.5"/>
        <!-- Flecha tendencia alcista -->
        <path d="M6 22 L14 16 L20 18 L27 10" stroke="#7EC8F4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="topbar-brand">Trading<span class="prop">PROP</span><span class="dash">Dashboard</span></div>
    </a>
    <div class="topbar-tabs">
      <button class="ttab active" onclick="showTab('overview',this)">Portafolio</button>
      <button class="ttab" onclick="showTab('cuentas',this)">Empresas & Cuentas</button>
      <button class="ttab" onclick="showTab('diversificacion',this)">Diversificación</button>
      <button class="ttab" onclick="showTab('financiero',this)">Financiero</button>
    </div>
    <div class="topbar-right">
      <span class="save-badge" id="save-badge">💾 Datos guardados localmente</span>
      <button class="btn-sm" onclick="exportData()">Exportar JSON</button>
      <button class="btn-sm" onclick="document.getElementById('import-input').click()">Importar</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>
</div>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-logo">
    <svg width="80" height="80" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="7" fill="#185FA5"/>
      <rect x="7" y="13" width="4" height="7" rx="1" fill="#fff" opacity="0.5"/>
      <line x1="9" y1="10" x2="9" y2="13" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      <line x1="9" y1="20" x2="9" y2="23" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
      <rect x="14" y="10" width="4" height="9" rx="1" fill="#fff" opacity="0.75"/>
      <line x1="16" y1="7" x2="16" y2="10" stroke="#fff" stroke-width="1.5" opacity="0.75"/>
      <line x1="16" y1="19" x2="16" y2="22" stroke="#fff" stroke-width="1.5" opacity="0.75"/>
      <rect x="21" y="7" width="4" height="10" rx="1" fill="#fff"/>
      <line x1="23" y1="5" x2="23" y2="7" stroke="#fff" stroke-width="1.5"/>
      <line x1="23" y1="17" x2="23" y2="20" stroke="#fff" stroke-width="1.5"/>
      <path d="M6 22 L14 16 L20 18 L27 10" stroke="#7EC8F4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="splash-title">Trading<span class="prop-splash">PROP</span></div>
  <div class="splash-subtitle">Gestión profesional de prop firms & capital propio</div>
  <div class="splash-divider"></div>
  <button class="splash-enter" onclick="enterApp()">Entrar al Dashboard →</button>
  <div class="splash-footer">Tus datos se guardan localmente en este dispositivo</div>
</div>

<div class="app" id="main-app" style="display:none">
  <div id="tab-overview" class="page"></div>
  <div id="tab-cuentas" class="page" style="display:none"></div>
  <div id="tab-diversificacion" class="page" style="display:none"></div>
  <div id="tab-financiero" class="page" style="display:none"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title">Agregar</div>
    <div id="modal-body"></div>
    <div class="f-actions">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="submitModal()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── DATA ──────────────────────────────────────────────
const STORAGE_KEY = 'tradingprop_v1';

let firms = [
  {id:1, name:"FTMO", type:"prop", color:"#0C447C"},
  {id:2, name:"Funded Trader", type:"prop", color:"#185FA5"},
  {id:3, name:"Topstep", type:"prop", color:"#378ADD"},
  {id:4, name:"E8 Funding", type:"prop", color:"#5B9FD4"},
  {id:5, name:"Capital Propio", type:"own", color:"#85B7E0"},
];

let accounts = [
  {id:1,firmId:1,name:"Cuenta A",accountId:"FT-100K-01",capital:100000,cost:540,withdrawn:5000,pnl:9200,split:80,ddCur:3.2,ddMax:10,phase:"active",strategy:"SMC",session:"london",months:[1200,2000,600,2400,1800,1200]},
  {id:2,firmId:1,name:"Cuenta B",accountId:"FT-200K-02",capital:200000,cost:1080,withdrawn:3000,pnl:9200,split:80,ddCur:1.8,ddMax:10,phase:"active",strategy:"SMC",session:"ny",months:[900,1800,400,2100,2200,1800]},
  {id:3,firmId:1,name:"Cuenta C",accountId:"FT-100K-03",capital:100000,cost:540,withdrawn:0,pnl:2100,split:80,ddCur:5.1,ddMax:10,phase:"eval",strategy:"Breakout",session:"overlap",months:[0,0,0,0,900,1200]},
  {id:4,firmId:2,name:"Principal",accountId:"FTR-100K-01",capital:100000,cost:325,withdrawn:5400,pnl:7600,split:90,ddCur:2.1,ddMax:8,phase:"active",strategy:"Price Action",session:"london",months:[800,1200,600,1800,1600,1600]},
  {id:5,firmId:3,name:"Futures 150K",accountId:"TS-150K-01",capital:150000,cost:165,withdrawn:3200,pnl:11200,split:80,ddCur:4.5,ddMax:6,phase:"funded",strategy:"Scalping",session:"ny",months:[1200,2100,900,2400,2600,2000]},
  {id:6,firmId:4,name:"Evaluación",accountId:"E8-80K-01",capital:80000,cost:220,withdrawn:0,pnl:-800,split:80,ddCur:5.8,ddMax:10,phase:"eval",strategy:"Swing",session:"swing",months:[-300,-500,0,0,0,0]},
  {id:7,firmId:5,name:"Cuenta personal",accountId:"OWN-001",capital:30000,cost:30000,withdrawn:2800,pnl:4800,split:100,ddCur:1.8,ddMax:20,phase:"active",strategy:"Multiestrategia",session:"all",months:[400,800,600,1000,1200,800]},
];

let nextFirmId = 20, nextAcctId = 20;
let modalMode = 'firm', editingId = null, modalFirmCtx = null;
let charts = {};

const MONTHS = ["Nov","Dic","Ene","Feb","Mar","Abr"];
const SESSIONS = {
  london:{label:"Londres",cls:"s-london"},
  ny:{label:"Nueva York",cls:"s-ny"},
  asia:{label:"Asia",cls:"s-asia"},
  overlap:{label:"Overlap LON/NY",cls:"s-overlap"},
  swing:{label:"Swing",cls:"s-swing"},
  all:{label:"Todas",cls:"s-all"}
};
const STRATEGIES = ["Price Action","Breakout","Scalping","Swing","Elliott Wave","Wyckoff","SMC","Multiestrategia","Otra"];
const PALETTE = ["#0C447C","#185FA5","#378ADD","#5B9FD4","#85B7E0","#B5D4F0","#D0E6F7","#E6F1FB"];
const SESS_COLORS = {london:'#0C447C',ny:'#185FA5',asia:'#378ADD',overlap:'#5B9FD4',swing:'#85B7E0',all:'#B5D4F0'};
const PHASE_COLORS = {active:'#185FA5', eval:'#5B9FD4', funded:'#0C447C', burned:'#D85A30'};

function enterApp() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('main-app').style.display = '';
}

// ─── PERSISTENCE ───────────────────────────────────────
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({firms, accounts, nextFirmId, nextAcctId}));
    showToast('Guardado ✓');
  } catch(e) {}
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.firms) firms = d.firms;
    if (d.accounts) accounts = d.accounts;
    if (d.nextFirmId) nextFirmId = d.nextFirmId;
    if (d.nextAcctId) nextAcctId = d.nextAcctId;
  } catch(e) {}
}

function exportData() {
  const blob = new Blob([JSON.stringify({firms, accounts, nextFirmId, nextAcctId}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tradingprop-backup-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.firms) firms = d.firms;
      if (d.accounts) accounts = d.accounts;
      if (d.trades) trades = d.trades;
      if (d.nextFirmId) nextFirmId = d.nextFirmId;
      if (d.nextAcctId) nextAcctId = d.nextAcctId;
      if (d.nextTradeId) nextTradeId = d.nextTradeId;
      saveData(); refreshCurrentTab();
      showToast('Importado correctamente ✓');
    } catch(err) { showToast('Error al importar el archivo'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ─── FORMATTERS ────────────────────────────────────────
function $abs(n) { return '$' + Math.abs(Math.round(n)).toLocaleString('es'); }
function $k(n) { const a=Math.abs(n); const s=a>=1000?'$'+(a/1000).toFixed(1)+'k':'$'+a.toFixed(0); return (n<0?'-':'')+s; }
function pct(n, d=1) { return (n>=0?'+':'')+n.toFixed(d)+'%'; }
function ddC(c, m) { const r=m?c/m:0; return r>.8?'#D85A30':r>.5?'#BA7517':'#1D9E75'; }
function myGain(a) { return a.pnl>0 ? a.pnl*(a.split/100) : a.pnl; }
function roi(a) { return a.capital ? (a.pnl/a.capital)*100 : 0; }
function realRoi(a) { if(!a.cost||a.cost===0) return null; return ((a.withdrawn-a.cost)/a.cost)*100; }
function firmById(id) { return firms.find(f=>f.id===id)||{name:'?',color:'#888'}; }
function acctById(id) { return accounts.find(a=>a.id===id)||{}; }
function acctsByFirm(fid) { return accounts.filter(a=>a.firmId===fid); }

function phaseBadge(p) {
  const m={active:'Activa', eval:'Evaluación', funded:'Fondeada', burned:'Quemada'};
  const c={active:'b-active', eval:'b-eval', funded:'b-funded', burned:'b-burned'};
  return `<span class="badge ${c[p]||'b-eval'}">${m[p]||p}</span>`;
}
function sessionBadge(s) {
  const d=SESSIONS[s]||{label:s,cls:'s-all'};
  return `<span class="s-badge ${d.cls}">${d.label}</span>`;
}
function stratBadge(s) { return `<span class="strat-badge">${s}</span>`; }

function totals(accts) {
  return {
    capital:   accts.filter(a=>a.phase!=='burned').reduce((s,a)=>s+a.capital,0),
    cost:      accts.reduce((s,a)=>s+a.cost,0), // burned cost IS included — it's money spent
    withdrawn: accts.reduce((s,a)=>s+a.withdrawn,0),
    pnl:       accts.filter(a=>a.phase!=='burned').reduce((s,a)=>s+a.pnl,0),
    myGain:    accts.filter(a=>a.phase!=='burned').reduce((s,a)=>s+myGain(a),0),
    burnedCost: accts.filter(a=>a.phase==='burned').reduce((s,a)=>s+a.cost,0),
  };
}

function kpiHtml(label, val, sub, cls='') {
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-val ${cls}">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;
}

// ─── CHARTS ────────────────────────────────────────────
function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

function buildChart(id, type, labels, datasets, opts={}) {
  destroyChart(id);
  const el = document.getElementById(id); if(!el) return;
  charts[id] = new Chart(el, {
    type, data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:opts.legend||false},tooltip:{callbacks:opts.tooltipCb||{}}},
      scales: (type==='doughnut'||type==='pie') ? {} : {
        x:{grid:{display:false},ticks:{color:'#888',font:{size:10},...(opts.xTicks||{})}},
        y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{color:'#888',font:{size:10},callback:opts.yFmt||(v=>v)},...(opts.yExtra||{})},
      },
      ...(opts.extra||{})
    }
  });
}

// ─── DIVERSIFICACIÓN ───────────────────────────────────
function calcDiversification() {
  const n = accounts.filter(a=>a.phase!=='burned').length;
  if (n === 0) return { score:0, firmScore:0, stratScore:0, sessScore:0, alerts:[], hhi_firm:1, hhi_strat:1, hhi_sess:1, sessCt:{}, stratCt:{} };
  const activeAccts = accounts.filter(a=>a.phase!=='burned');

  const T = activeAccts.reduce((s,a)=>s+a.capital, 0) || 1;

  const firmCap = {};
  activeAccts.forEach(a=>{ firmCap[a.firmId]=(firmCap[a.firmId]||0)+a.capital; });
  const hhi_firm = Object.values(firmCap).reduce((s,c)=>s+Math.pow(c/T,2),0);
  const firmScore = Math.round((1 - hhi_firm) * 100);

  const stratCt = {};
  activeAccts.forEach(a=>{ stratCt[a.strategy]=(stratCt[a.strategy]||0)+1; });
  const hhi_strat = Object.values(stratCt).reduce((s,c)=>s+Math.pow(c/n,2),0);
  const stratScore = Math.round((1 - hhi_strat) * 100);

  const sessCt = {};
  activeAccts.forEach(a=>{ sessCt[a.session]=(sessCt[a.session]||0)+1; });
  const hhi_sess = Object.values(sessCt).reduce((s,c)=>s+Math.pow(c/n,2),0);
  const sessScore = Math.round((1 - hhi_sess) * 100);

  const score = Math.round(firmScore*0.4 + stratScore*0.35 + sessScore*0.25);

  const alerts = [];
  const topFirm = Object.entries(firmCap).sort((a,b)=>b[1]-a[1])[0];
  const topFirmPct = topFirm ? (topFirm[1]/T*100) : 0;
  const topFirmName = topFirm ? (firmById(parseInt(topFirm[0])).name) : '';
  if (topFirmPct > 60) alerts.push({level:'danger', icon:'⚠️', text:`<strong>${topFirmPct.toFixed(0)}% del capital</strong> está en ${topFirmName}. Si esta cuenta falla o es suspendida, el impacto es crítico.`});
  else if (topFirmPct > 40) alerts.push({level:'warn', icon:'⚡', text:`<strong>${topFirmPct.toFixed(0)}% del capital</strong> concentrado en ${topFirmName}. Considera distribuir más.`});

  const topStrat = Object.entries(stratCt).sort((a,b)=>b[1]-a[1])[0];
  const topStratPct = topStrat ? (topStrat[1]/n*100) : 0;
  if (topStratPct === 100) alerts.push({level:'danger', icon:'⚠️', text:`<strong>Todas las cuentas usan "${topStrat[0]}"</strong>. Si el mercado invalida esta estrategia, todo el portafolio sufre al mismo tiempo.`});
  else if (topStratPct >= 60) alerts.push({level:'warn', icon:'⚡', text:`<strong>${topStrat[1]} de ${n} cuentas</strong> usan "${topStrat[0]}". Alta correlación de estrategia — riesgo sistémico moderado.`});

  const topSess = Object.entries(sessCt).sort((a,b)=>b[1]-a[1])[0];
  const topSessPct = topSess ? (topSess[1]/n*100) : 0;
  const topSessLabel = topSess ? (SESSIONS[topSess[0]]?.label || topSess[0]) : '';
  if (topSessPct === 100) alerts.push({level:'warn', icon:'⚡', text:`<strong>Todas las cuentas operan en la misma sesión</strong> (${topSessLabel}). Un evento de alta volatilidad en esa sesión afecta todo el portafolio.`});
  else if (topSessPct >= 70) alerts.push({level:'warn', icon:'⚡', text:`<strong>${topSessPct.toFixed(0)}% de cuentas</strong> en sesión ${topSessLabel}. Considera abrir cuentas en otras sesiones.`});

  const nFirms = Object.keys(firmCap).length;
  if (n >= 3 && nFirms === 1) alerts.push({level:'danger', icon:'⚠️', text:`<strong>Todas las cuentas son de una sola empresa.</strong> Si la prop firm cierra o cambia reglas, pierdes todo el capital gestionado.`});
  else if (n >= 4 && nFirms === 2) alerts.push({level:'warn', icon:'⚡', text:`Solo ${nFirms} empresas para ${n} cuentas. Diversificar en más prop firms reduce el riesgo operacional.`});

  const burnedCount = accounts.filter(a=>a.phase==='burned').length;
  if (burnedCount > 0) alerts.push({level:'warn', icon:'⚡', text:`<strong>${burnedCount} cuenta${burnedCount>1?'s':''} quemada${burnedCount>1?'s':''}</strong> en el historial. El costo de esas pruebas está incluido en tu ROI real del negocio.`});

  if (score >= 75 && alerts.filter(a=>a.level!=='good').length === 0) alerts.push({level:'good', icon:'✅', text:`<strong>Portafolio bien diversificado.</strong> Buena distribución entre empresas, estrategias y sesiones.`});

  return { score, firmScore, stratScore, sessScore, alerts, sessCt, stratCt };
}

function scoreColor(s) { return s >= 70 ? '#1D9E75' : s >= 45 ? '#BA7517' : '#D85A30'; }
function scoreLabel(s) { return s >= 70 ? 'Buena' : s >= 45 ? 'Moderada' : 'Riesgo alto'; }

function renderDiversificacion() {
  const { score, firmScore, stratScore, sessScore, alerts, sessCt, stratCt } = calcDiversification();
  const n = accounts.length;

  const phaseCt = {};
  accounts.filter(a=>a.phase!=='burned').forEach(a=>{ phaseCt[a.phase]=(phaseCt[a.phase]||0)+1; });
  const sessCap = {};
  accounts.forEach(a=>{ sessCap[a.session]=(sessCap[a.session]||0)+a.capital; });
  const typeCount={prop:0,own:0};
  accounts.forEach(a=>{ const f=firmById(a.firmId); typeCount[f.type]=(typeCount[f.type]||0)+1; });

  const sc = scoreColor(score);
  const sl = scoreLabel(score);

  const alertColors = { danger:'#FCEBEB', warn:'#FAEEDA', good:'#EAF3DE' };
  const alertBorder = { danger:'#D85A30', warn:'#BA7517', good:'#1D9E75' };
  const alertText   = { danger:'#501313', warn:'#412402', good:'#173404' };

  const html = `
  <!-- SCORE HEADER -->
  <div class="row row-2" style="margin-bottom:14px">
    <div class="card" style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
      <div style="position:relative;width:110px;height:110px;flex-shrink:0">
        <svg viewBox="0 0 110 110" style="width:110px;height:110px;transform:rotate(-90deg)">
          <circle cx="55" cy="55" r="46" fill="none" stroke="var(--border)" stroke-width="10"/>
          <circle cx="55" cy="55" r="46" fill="none" stroke="${sc}" stroke-width="10"
            stroke-dasharray="${(score/100)*289} 289" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <div style="font-size:28px;font-weight:700;color:${sc}">${score}</div>
          <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em">/ 100</div>
        </div>
      </div>
      <div style="flex:1">
        <div style="font-size:18px;font-weight:600;color:${sc};margin-bottom:4px">Diversificación ${sl}</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:14px">Score calculado sobre ${n} cuenta${n!==1?'s':''} activas</div>
        ${[
          ['Por empresa (40%)', firmScore],
          ['Por estrategia (35%)', stratScore],
          ['Por sesión (25%)', sessScore],
        ].map(([label, val])=>`
          <div style="margin-bottom:8px">
            <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
              <span style="color:var(--text2)">${label}</span>
              <span style="font-weight:600;color:${scoreColor(val)}">${val}/100</span>
            </div>
            <div class="dd-bar-bg"><div class="dd-bar" style="width:${val}%;background:${scoreColor(val)};height:6px;border-radius:99px"></div></div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Alertas & recomendaciones</div>
      ${alerts.length === 0
        ? `<div style="font-size:12px;color:var(--text2)">Sin alertas activas.</div>`
        : alerts.map(a=>`
          <div style="background:${alertColors[a.level]};border-left:3px solid ${alertBorder[a.level]};border-radius:6px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:${alertText[a.level]};line-height:1.6">
            ${a.icon} ${a.text}
          </div>`).join('')}
      <div style="margin-top:12px;font-size:11px;color:var(--text2);line-height:1.6">
        El score usa el <strong>Índice Herfindahl-Hirschman (HHI)</strong> — métrica estándar en economía para medir concentración de mercado, adaptada aquí para portafolios de trading.
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row row-3">
    <div class="card"><div class="card-title">Por sesión</div><div class="chart-wrap h180"><canvas id="c-d-sess"></canvas></div></div>
    <div class="card"><div class="card-title">Por estrategia</div><div class="chart-wrap h180"><canvas id="c-d-strat"></canvas></div></div>
    <div class="card"><div class="card-title">Por fase</div><div class="chart-wrap h180"><canvas id="c-d-phase"></canvas></div></div>
  </div>

  <div class="row row-2">
    <div class="card">
      <div class="card-title">Mapa de cuentas — sesión × estrategia</div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Empresa</th><th>Cuenta</th><th>Sesión</th><th>Estrategia</th><th>Capital</th><th>Fase</th><th>P&L</th></tr></thead>
        <tbody>${accounts.map(a=>{
          const f=firmById(a.firmId);
          return `<tr>
            <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${f.color};flex-shrink:0"></span>${f.name}</span></td>
            <td style="font-weight:500">${a.name}</td>
            <td>${sessionBadge(a.session)}</td>
            <td>${stratBadge(a.strategy)}</td>
            <td>${$abs(a.capital)}</td>
            <td>${phaseBadge(a.phase)}</td>
            <td class="${a.pnl>=0?'pos':'neg'}">${(a.pnl>=0?'+':'')+$abs(a.pnl)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">Capital por sesión</div>
      <div class="chart-wrap h180"><canvas id="c-d-cap-sess"></canvas></div>
      <div style="margin-top:16px">
        <div class="card-title">Resumen</div>
        ${[
          ['Empresas con cuentas', firms.filter(f=>acctsByFirm(f.id).length>0).length],
          ['Cuentas totales', accounts.length],
          ['Cuentas activas', accounts.filter(a=>a.phase==='active').length],
          ['Fondeadas', accounts.filter(a=>a.phase==='funded').length],
          ['En evaluación', accounts.filter(a=>a.phase==='eval').length],
          ['Quemadas', accounts.filter(a=>a.phase==='burned').length],
          ['Sesiones cubiertas', Object.keys(sessCt).length],
          ['Estrategias distintas', Object.keys(stratCt).length],
          ['Prop firms', typeCount.prop||0],
          ['Capital propio', typeCount.own||0],
        ].map(([l,v])=>`<div class="sum-row"><span style="color:var(--text2)">${l}</span><span style="font-weight:500">${v}</span></div>`).join('')}
      </div>
    </div>
  </div>`;

  document.getElementById('tab-diversificacion').innerHTML = html;

  const sk = Object.keys(sessCt);
  buildChart('c-d-sess','doughnut',sk.map(s=>SESSIONS[s]?.label||s),[{data:sk.map(s=>sessCt[s]),backgroundColor:sk.map(s=>SESS_COLORS[s]||'#888'),borderWidth:0}],{legend:true,extra:{cutout:'50%'}});

  const stk = Object.keys(stratCt);
  buildChart('c-d-strat','doughnut',stk,[{data:stk.map(s=>stratCt[s]),backgroundColor:PALETTE,borderWidth:0}],{legend:true,extra:{cutout:'50%'}});

  const pk = Object.keys(phaseCt);
  buildChart('c-d-phase','doughnut',pk.map(p=>({active:'Activa',eval:'Evaluación',funded:'Fondeada'}[p]||p)),[{data:pk.map(p=>phaseCt[p]),backgroundColor:pk.map(p=>PHASE_COLORS[p]||'#888'),borderWidth:0}],{legend:true,extra:{cutout:'50%'}});

  const sck = Object.keys(sessCap);
  buildChart('c-d-cap-sess','bar',sck.map(s=>SESSIONS[s]?.label||s),[{data:sck.map(s=>sessCap[s]),backgroundColor:sck.map(s=>SESS_COLORS[s]||'#888'),borderRadius:4}],{yFmt:v=>'$'+(Math.abs(v)>=1000?(v/1000).toFixed(0)+'k':v)});
}

// ─── FINANCIERO ────────────────────────────────────────
function renderFinanciero() {
  const T = totals(accounts);
  const netProfit = T.withdrawn - T.cost;
  const monthlyTotal = MONTHS.map((_,i)=>accounts.reduce((s,a)=>s+(a.months[i]||0),0));

  const html = `
  <div class="kpi-grid" style="grid-template-columns:repeat(4,minmax(0,1fr))">
    ${kpiHtml('Total invertido',$abs(T.cost),'costo acumulado de cuentas')}
    ${kpiHtml('Total retirado',$abs(T.withdrawn),'','pos')}
    ${kpiHtml('Ganancia neta real',(netProfit>=0?'+':'')+$abs(netProfit),'',netProfit>=0?'pos':'neg')}
    ${kpiHtml('Por cobrar (splits)',(T.myGain>=0?'+':'')+$abs(Math.round(T.myGain)),'ganancia acumulada pendiente',T.myGain>=0?'pos':'neg')}
  </div>
  <div class="row row-2">
    <div class="card"><div class="card-title">P&L mensual del portafolio</div><div class="chart-wrap h220"><canvas id="c-f-pnl"></canvas></div></div>
    <div class="card"><div class="card-title">Costo vs. Retirado por empresa</div><div class="chart-wrap h220"><canvas id="c-f-cvw"></canvas></div></div>
  </div>
  <div class="card">
    <div class="card-title">ROI real por cuenta — detalle completo</div>
    <div class="tbl-wrap"><table class="tbl">
      <thead><tr><th>Empresa</th><th>Cuenta</th><th>Costo cuenta</th><th>Total retirado</th><th>Ganancia neta</th><th>ROI real</th><th>Por cobrar (splits)</th><th>Split %</th></tr></thead>
      <tbody>
      ${accounts.map(a=>{
        const f=firmById(a.firmId); const mg=myGain(a); const rr=realRoi(a); const net=a.withdrawn-a.cost;
        return `<tr>
          <td><span style="display:inline-flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${f.color}"></span>${f.name}</span></td>
          <td style="font-weight:500">${a.name}</td>
          <td>${$abs(a.cost)}</td>
          <td class="${a.withdrawn>0?'pos':''}">${$abs(a.withdrawn)}</td>
          <td class="${net>=0?'pos':'neg'}">${(net>=0?'+':'')+$abs(net)}</td>
          <td class="${rr===null?'':(rr>=0?'pos':'neg')}" style="font-weight:500">${rr===null?'—':pct(rr)}</td>
          <td class="${mg>=0?'pos':'neg'}">${(mg>=0?'+':'')+$abs(Math.round(mg))}</td>
          <td>${a.split}%</td>
        </tr>`;
      }).join('')}
      <tr style="background:var(--bg2)">
        <td colspan="2" style="font-weight:500">Total global</td>
        <td style="font-weight:500">${$abs(T.cost)}</td>
        <td class="pos" style="font-weight:500">${$abs(T.withdrawn)}</td>
        <td class="${netProfit>=0?'pos':'neg'}" style="font-weight:500">${(netProfit>=0?'+':'')+$abs(netProfit)}</td>
        <td class="${T.cost?(T.withdrawn-T.cost)/T.cost*100>=0?'pos':'neg':''}" style="font-weight:500">${T.cost?pct((T.withdrawn-T.cost)/T.cost*100):'—'}</td>
        <td class="pos" style="font-weight:500">${$abs(Math.round(T.myGain))}</td>
        <td>—</td>
      </tr>
      </tbody>
    </table></div>
  </div>`;

  document.getElementById('tab-financiero').innerHTML = html;

  buildChart('c-f-pnl','bar',MONTHS,[{data:monthlyTotal,backgroundColor:monthlyTotal.map(v=>v>=0?'#5DCAA5':'#F0997B'),borderRadius:4}],{yFmt:v=>'$'+(Math.abs(v)>=1000?(v/1000).toFixed(0)+'k':v),tooltipCb:{label:c=>(c.parsed.y>=0?'+':'')+$abs(c.parsed.y)}});

  const fd = firms.map(f=>{const acs=acctsByFirm(f.id);return{name:f.name,color:f.color,cost:acs.reduce((s,a)=>s+a.cost,0),w:acs.reduce((s,a)=>s+a.withdrawn,0)};}).filter(x=>x.cost>0);
  buildChart('c-f-cvw','bar',fd.map(x=>x.name),[
    {label:'Costo',data:fd.map(x=>x.cost),backgroundColor:'#B5D4F4',borderRadius:3},
    {label:'Retirado',data:fd.map(x=>x.w),backgroundColor:'#5DCAA5',borderRadius:3},
  ],{legend:true,yFmt:v=>'$'+(Math.abs(v)>=1000?(v/1000).toFixed(0)+'k':v)});
}

// ─── TABS ──────────────────────────────────────────────
const TABS = ['overview','cuentas','diversificacion','financiero'];
let currentTab = 'overview';

function showTab(tab, el) {
  TABS.forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
  document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  setTimeout(()=>refreshTab(tab), 20);
}

function refreshCurrentTab() { refreshTab(currentTab); }

function refreshTab(tab) {
  if(tab==='overview') renderOverview();
  if(tab==='cuentas') renderCuentas();
  if(tab==='diversificacion') renderDiversificacion();
  if(tab==='financiero') renderFinanciero();
}

// ─── MODAL ─────────────────────────────────────────────
function openModal(mode, id=null, firmCtx=null) {
  modalMode=mode; editingId=id; modalFirmCtx=firmCtx;
  const firmOpts = firms.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
  const sessOpts = Object.entries(SESSIONS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  const stratOpts = STRATEGIES.map(s=>`<option value="${s}">${s}</option>`).join('');
  const phaseOpts = ['eval','funded','active','burned'].map(p=>`<option value="${p}">${{eval:'Evaluación',funded:'Fondeada',active:'Activa',burned:'Quemada'}[p]}</option>`).join('');

  if (mode==='firm') {
    document.getElementById('modal-title').textContent = id ? 'Editar empresa' : 'Nueva empresa';
    document.getElementById('modal-body').innerHTML = `
      <div class="f-2">
        <div class="f-row"><label class="f-label">Nombre</label><input id="m-fname" placeholder="FTMO, Apex..."></div>
        <div class="f-row"><label class="f-label">Tipo</label><select id="m-ftype"><option value="prop">Prop firm</option><option value="own">Capital propio</option></select></div>
      </div>
      <div class="f-row"><label class="f-label">Color identificador</label><br><input type="color" id="m-fcolor" value="#378ADD" style="width:56px;height:36px;padding:2px;border-radius:6px;border:0.5px solid var(--border2);cursor:pointer"></div>`;
    if (id) { const f=firms.find(x=>x.id===id); if(f){setTimeout(()=>{document.getElementById('m-fname').value=f.name;document.getElementById('m-ftype').value=f.type;document.getElementById('m-fcolor').value=f.color;},30);}}
  } else if (mode==='account') {
    document.getElementById('modal-title').textContent = id ? 'Editar cuenta' : 'Nueva cuenta';
    document.getElementById('modal-body').innerHTML = `
      <div class="f-2">
        <div class="f-row"><label class="f-label">Empresa</label><select id="m-afirm">${firmOpts}</select></div>
        <div class="f-row"><label class="f-label">Nombre de cuenta</label><input id="m-aname" placeholder="Cuenta A, Principal..."></div>
      </div>
      <div class="f-2">
        <div class="f-row"><label class="f-label">ID / número de cuenta</label><input id="m-aid" placeholder="FT-100K-01"></div>
        <div class="f-row"><label class="f-label">Fase</label><select id="m-aphase">${phaseOpts}</select></div>
      </div>
      <div class="f-2">
        <div class="f-row"><label class="f-label">Sesión</label><select id="m-asess">${sessOpts}</select></div>
        <div class="f-row"><label class="f-label">Estrategia</label>
          <input id="m-astrat" list="strat-list" placeholder="Escribe o elige...">
          <datalist id="strat-list">${STRATEGIES.map(s=>`<option value="${s}">`).join('')}</datalist>
        </div>
      </div>
      <div class="f-2">
        <div class="f-row"><label class="f-label">Capital gestionado ($)</label><input id="m-acap" type="number" placeholder="100000"></div>
        <div class="f-row"><label class="f-label">Costo de la cuenta ($)</label><input id="m-acost" type="number" placeholder="540"></div>
      </div>
      <div class="f-2">
        <div class="f-row"><label class="f-label">P&L neto ($)</label><input id="m-apnl" type="number" placeholder="8500"></div>
        <div class="f-row"><label class="f-label">Total retirado ($)</label><input id="m-awith" type="number" placeholder="3000"></div>
      </div>
      <div class="f-3">
        <div class="f-row"><label class="f-label">Profit split (%)</label><input id="m-asplit" type="number" placeholder="80"></div>
        <div class="f-row"><label class="f-label">DD actual (%)</label><input id="m-addc" type="number" placeholder="3.2"></div>
        <div class="f-row"><label class="f-label">DD máximo (%)</label><input id="m-addm" type="number" placeholder="10"></div>
      </div>`;
    setTimeout(()=>{
      if(firmCtx) document.getElementById('m-afirm').value=firmCtx;
      if(id){const a=accounts.find(x=>x.id===id);if(a){document.getElementById('m-afirm').value=a.firmId;document.getElementById('m-aname').value=a.name;document.getElementById('m-aid').value=a.accountId;document.getElementById('m-aphase').value=a.phase;document.getElementById('m-asess').value=a.session;document.getElementById('m-astrat').value=a.strategy;document.getElementById('m-acap').value=a.capital;document.getElementById('m-acost').value=a.cost;document.getElementById('m-apnl').value=a.pnl;document.getElementById('m-awith').value=a.withdrawn;document.getElementById('m-asplit').value=a.split;document.getElementById('m-addc').value=a.ddCur;document.getElementById('m-addm').value=a.ddMax;}}
    },30);
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function submitModal() {
  if(modalMode==='firm') saveFirm();
  else saveAccount();
}

function saveFirm() {
  const name=document.getElementById('m-fname').value.trim();
  const type=document.getElementById('m-ftype').value;
  const color=document.getElementById('m-fcolor').value;
  if(!name) return;
  if(editingId){const i=firms.findIndex(f=>f.id===editingId);if(i>=0)firms[i]={...firms[i],name,type,color};}
  else firms.push({id:nextFirmId++,name,type,color});
  closeModal(); saveData(); renderCuentas();
}

function saveAccount() {
  const data={
    firmId:parseInt(document.getElementById('m-afirm').value),
    name:document.getElementById('m-aname').value.trim(),
    accountId:document.getElementById('m-aid').value.trim(),
    phase:document.getElementById('m-aphase').value,
    session:document.getElementById('m-asess').value,
    strategy:document.getElementById('m-astrat').value,
    capital:parseFloat(document.getElementById('m-acap').value)||0,
    cost:parseFloat(document.getElementById('m-acost').value)||0,
    pnl:parseFloat(document.getElementById('m-apnl').value)||0,
    withdrawn:parseFloat(document.getElementById('m-awith').value)||0,
    split:parseFloat(document.getElementById('m-asplit').value)||80,
    ddCur:parseFloat(document.getElementById('m-addc').value)||0,
    ddMax:parseFloat(document.getElementById('m-addm').value)||10,
    months:[0,0,0,0,0,0],
  };
  if(!data.name) return;
  if(editingId){const i=accounts.findIndex(a=>a.id===editingId);if(i>=0)accounts[i]={...accounts[i],...data};}
  else{data.id=nextAcctId++;accounts.push(data);}
  closeModal(); saveData(); renderCuentas(); renderOverview();
}

function saveTrade() {
  const data={id:nextTradeId++,date:document.getElementById('t-date').value,accountId:parseInt(document.getElementById('t-acct').value),pair:document.getElementById('t-pair').value.trim().toUpperCase(),dir:document.getElementById('t-dir').value,lots:parseFloat(document.getElementById('t-lots').value)||1,pnl:parseFloat(document.getElementById('t-pnl').value)||0,entry:parseFloat(document.getElementById('t-entry').value)||0,sl:parseFloat(document.getElementById('t-sl').value)||0,tp:parseFloat(document.getElementById('t-tp').value)||0,status:document.getElementById('t-status').value};
  if(!data.pair) return;
  trades.push(data); closeModal(); saveData(); renderTrades();
}

function deleteFirm(id) {
  if(!confirm('¿Eliminar esta empresa y todas sus cuentas?')) return;
  accounts = accounts.filter(a=>a.firmId!==id);
  firms = firms.filter(f=>f.id!==id);
  saveData(); renderCuentas(); renderOverview();
}

function deleteAcct(id) {
  if(!confirm('¿Eliminar esta cuenta?')) return;
  accounts = accounts.filter(a=>a.id!==id);
  saveData(); renderCuentas(); renderOverview();
}

document.getElementById('modal-bg').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-bg')) closeModal();
});

// ─── INIT ──────────────────────────────────────────────
loadData();
renderOverview();
</script>
</body>
</html>
